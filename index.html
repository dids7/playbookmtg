<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useRef } = React;

// ---------- Helpers ----------
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function emptyGame() {
  return { resultado: null, mulligan: 0, playDraw: null };
}
function emptyForm() {
  return {
    formato: "", meuDeck: "", oponenteDeck: "", games: [emptyGame(), emptyGame()],
    tipo: "treino", local: "", data: todayISO(), rodada: "", colocacao: "", nota: "",
  };
}
function matchOutcome(games) {
  const played = games.filter((g) => g.resultado);
  const wins = played.filter((g) => g.resultado === "vitoria").length;
  const losses = played.filter((g) => g.resultado === "derrota").length;
  if (wins >= 2) return { outcome: "vitoria", score: `${wins}-${losses}` };
  if (losses >= 2) return { outcome: "derrota", score: `${wins}-${losses}` };
  return { outcome: null, score: `${wins}-${losses}` };
}
function needsGame3(games) {
  return games[0].resultado && games[1].resultado && games[0].resultado !== games[1].resultado;
}
function barColor(wr) {
  if (wr >= 60) return "#4B6B4E";
  if (wr >= 40) return "#B08B3E";
  return "#8A3F35";
}

// ---------- Firestore data layer ----------
// Catálogo compartilhado: formatos e decks, visível e editável por qualquer usuário logado
// Formatos jogados pelo time — lista fixa, só editável aqui no código
const FORMATOS = ["Pauper", "Duel Commander 500", "Duel Commander", "Premodern", "Legacy"];
// Formatos com sideboard tradicional (exclui Commander, que não tem G2/G3 com troca de cartas)
const SIDEBOARD_FORMATOS = ["Pauper", "Premodern", "Legacy"];

const DEFAULT_PAUPER_DECKS = [
  "Mono Red Madness", "Grixis Affinity", "Blue Terror", "Jund Wildfire", "Snacker Gates",
  "Monsters Tron", "Altar Tron", "Mono Red Rally", "Elves", "Dimir Faeries",
  "Jeskai Ephemerate", "Spy Combo", "White Weenie", "Golgari Gardens", "Rakdos Madness",
  "Familiars", "Ruby Storm", "Mono-Blue Faeries", "Dimir Terror", "Selesnya Gates",
  "Gruul Ponza", "Turbo Fog", "Bogles", "Food Gardens", "Black Sacrifice",
  "Inside Out Combo", "Gruul Ramp", "Glintblade", "Azorius Gates", "Walls Combo",
  "Izzet Terror", "Ephemerate Tron", "Boros Bully", "Cycle Storm",
];

function generateInviteCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sem caracteres ambíguos (0/O, 1/I)
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function createTeam(uidStr, teamName) {
  const { db, doc, collection, setDoc, getDoc } = window.__fb;
  const inviteCode = generateInviteCode();
  const teamRef = doc(collection(db, "teams"));
  await setDoc(teamRef, { name: teamName, inviteCode, ownerUid: uidStr, createdAt: Date.now() });
  await setDoc(doc(db, "users", uidStr), { teamId: teamRef.id }, { merge: true });
  return { teamId: teamRef.id, inviteCode };
}

async function joinTeamByCode(uidStr, code) {
  const { db, collection, query, where, getDocs, doc, setDoc } = window.__fb;
  const normalized = code.trim().toUpperCase();
  const q = query(collection(db, "teams"), where("inviteCode", "==", normalized));
  const snap = await getDocs(q);
  if (snap.empty) throw new Error("Código não encontrado. Confere se digitou certo.");
  const teamDoc = snap.docs[0];
  await setDoc(doc(db, "users", uidStr), { teamId: teamDoc.id }, { merge: true });
  return { teamId: teamDoc.id, teamName: teamDoc.data().name, inviteCode: teamDoc.data().inviteCode };
}

async function loadUserTeam(uidStr) {
  const { db, doc, getDoc } = window.__fb;
  const userSnap = await getDoc(doc(db, "users", uidStr));
  const teamId = userSnap.exists() ? userSnap.data().teamId : null;
  if (!teamId) return null;
  const teamSnap = await getDoc(doc(db, "teams", teamId));
  if (!teamSnap.exists()) return null;
  return { teamId, name: teamSnap.data().name, inviteCode: teamSnap.data().inviteCode };
}

async function seedPauperDecksIfNeeded(teamId, decks) {
  const hasPauperDecks = decks.some((d) => d.formato === "Pauper");
  if (hasPauperDecks) return;
  const { db, doc, setDoc } = window.__fb;
  const ref = doc(db, "teams", teamId, "data", "catalog");
  const newDecks = [...decks, ...DEFAULT_PAUPER_DECKS.map((name) => ({ name, formato: "Pauper" }))];
  try {
    await setDoc(ref, { decks: newDecks });
  } catch (e) {
    console.error("Erro ao popular decks padrão do Pauper:", e);
  }
}

function subscribeSharedCatalog(teamId, callback) {
  const { db, doc, onSnapshot } = window.__fb;
  const ref = doc(db, "teams", teamId, "data", "catalog");
  return onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      const decksRaw = d.decks || [];
      const decks = decksRaw.map((dk) => (typeof dk === "string" ? { name: dk, formato: "" } : dk));
      callback(decks);
    } else {
      callback([]);
    }
  }, (err) => {
    console.error("Erro ao sincronizar catálogo compartilhado:", err);
  });
}
async function saveSharedDecks(teamId, decks) {
  const { db, doc, setDoc } = window.__fb;
  const ref = doc(db, "teams", teamId, "data", "catalog");
  await setDoc(ref, { decks });
}

// Jogadores: perfil compartilhável com toggle de visibilidade, isolado por time
async function syncPlayerVisibility(teamId, uidStr, displayName, visible, matches) {
  const { db, doc, setDoc } = window.__fb;
  const ref = doc(db, "teams", teamId, "players", uidStr);
  await setDoc(ref, { displayName, visible, matches });
}
async function loadOwnVisibility(teamId, uidStr) {
  const { db, doc, getDoc } = window.__fb;
  const ref = doc(db, "teams", teamId, "players", uidStr);
  const snap = await getDoc(ref);
  if (snap.exists()) return !!snap.data().visible;
  return false;
}
function subscribeVisiblePlayers(teamId, myUid, callback) {
  const { db, collection, query, where, onSnapshot } = window.__fb;
  const q = query(collection(db, "teams", teamId, "players"), where("visible", "==", true));
  return onSnapshot(q, (snap) => {
    const list = [];
    snap.forEach((docSnap) => {
      if (docSnap.id === myUid) return;
      const d = docSnap.data();
      list.push({ uid: docSnap.id, displayName: d.displayName || "Jogador", matches: d.matches || [] });
    });
    callback(list);
  }, (err) => {
    console.error("Erro ao sincronizar lista de jogadores:", err);
  });
}
function computeMatchStats(matches) {
  const total = matches.length;
  const wins = matches.filter((m) => m.resultado === "vitoria").length;
  const losses = matches.filter((m) => m.resultado === "derrota").length;
  const winRate = total ? Math.round((wins / total) * 100) : 0;
  const byOpp = {};
  matches.forEach((m) => {
    byOpp[m.oponenteDeck] = byOpp[m.oponenteDeck] || { total: 0, wins: 0 };
    byOpp[m.oponenteDeck].total += 1;
    if (m.resultado === "vitoria") byOpp[m.oponenteDeck].wins += 1;
  });
  const chartData = Object.entries(byOpp)
    .map(([opp, v]) => ({ name: opp, total: v.total, winRate: Math.round((v.wins / v.total) * 100) }))
    .sort((a, b) => b.total - a.total);
  return { total, wins, losses, winRate, chartData };
}
function deckKey(formato, name) { return formato + "||" + name; }

const MONTH_NAMES_PT = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
function monthKey(dateStr) { return dateStr.slice(0, 7); } // "2026-07"
function monthLabel(key) {
  const [y, m] = key.split("-");
  return `${MONTH_NAMES_PT[parseInt(m, 10) - 1]} de ${y}`;
}
function prevMonthKey(key) {
  const [y, m] = key.split("-").map((n) => parseInt(n, 10));
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function computeMonthlyReport(allMatches, monthKeyStr) {
  const matches = allMatches.filter((m) => monthKey(m.data) === monthKeyStr);
  const prevMatches = allMatches.filter((m) => monthKey(m.data) === prevMonthKey(monthKeyStr));

  const total = matches.length;
  const wins = matches.filter((m) => m.resultado === "vitoria").length;
  const losses = total - wins;
  const winRate = total ? Math.round((wins / total) * 100) : 0;
  const prevWinRate = prevMatches.length ? Math.round((prevMatches.filter((m) => m.resultado === "vitoria").length / prevMatches.length) * 100) : null;

  const byTipo = (tipo) => {
    const list = matches.filter((m) => m.tipo === tipo);
    const w = list.filter((m) => m.resultado === "vitoria").length;
    return { total: list.length, wins: w, winRate: list.length ? Math.round((w / list.length) * 100) : 0 };
  };
  const torneio = byTipo("torneio");
  const treino = byTipo("treino");

  const allGames = matches.flatMap((m) => m.games || []);
  const byPlayDraw = (pd) => {
    const list = allGames.filter((g) => g.playDraw === pd);
    const w = list.filter((g) => g.resultado === "vitoria").length;
    return { total: list.length, wins: w, winRate: list.length ? Math.round((w / list.length) * 100) : 0 };
  };
  const play = byPlayDraw("play");
  const draw = byPlayDraw("draw");

  const byOpp = {};
  matches.forEach((m) => {
    byOpp[m.oponenteDeck] = byOpp[m.oponenteDeck] || { total: 0, wins: 0 };
    byOpp[m.oponenteDeck].total += 1;
    if (m.resultado === "vitoria") byOpp[m.oponenteDeck].wins += 1;
  });
  const matchupStats = Object.entries(byOpp).map(([opp, v]) => ({
    opp, total: v.total, wins: v.wins, losses: v.total - v.wins, winRate: Math.round((v.wins / v.total) * 100),
  })).sort((a, b) => b.total - a.total);

  const bestMatchup = [...matchupStats].filter((m) => m.total >= 2).sort((a, b) => b.winRate - a.winRate)[0] || null;
  const worstMatchups = [...matchupStats].filter((m) => m.total >= 2).sort((a, b) => a.winRate - b.winRate).slice(0, 3);

  const mirrorMatches = matches.filter((m) => m.meuDeck === m.oponenteDeck);
  const mirrorWins = mirrorMatches.filter((m) => m.resultado === "vitoria").length;

  const wonG1LostMatch = matches.filter((m) => m.games && m.games[0] && m.games[0].resultado === "vitoria" && m.resultado === "derrota");

  const lossNotes = matches.filter((m) => m.resultado === "derrota" && m.nota && m.nota.trim());

  const totalLosses = matches.filter((m) => m.resultado === "derrota").length;
  const lossesWithMulligan = matches.filter((m) => m.resultado === "derrota" && m.games && m.games.some((g) => g.mulligan > 0)).length;

  const gamesWithMulligan = allGames.filter((g) => g.mulligan > 0);
  const gamesNoMulligan = allGames.filter((g) => g.mulligan === 0);
  const mullWinRate = (list) => {
    const w = list.filter((g) => g.resultado === "vitoria").length;
    return list.length ? Math.round((w / list.length) * 100) : 0;
  };

  const sorted = [...matches].sort((a, b) => a.data.localeCompare(b.data));
  let curStreak = 0, curType = null, bestWinStreak = 0, bestLossStreak = 0;
  sorted.forEach((m) => {
    if (m.resultado === curType) { curStreak += 1; } else { curType = m.resultado; curStreak = 1; }
    if (curType === "vitoria") bestWinStreak = Math.max(bestWinStreak, curStreak);
    if (curType === "derrota") bestLossStreak = Math.max(bestLossStreak, curStreak);
  });

  const torneiosMap = {};
  matches.filter((m) => m.tipo === "torneio").forEach((m) => {
    const key = m.local + "|" + m.data;
    torneiosMap[key] = { local: m.local, data: m.data, colocacao: m.colocacao };
  });

  const byDeck = {};
  matches.forEach((m) => {
    byDeck[m.meuDeck] = byDeck[m.meuDeck] || { total: 0, wins: 0 };
    byDeck[m.meuDeck].total += 1;
    if (m.resultado === "vitoria") byDeck[m.meuDeck].wins += 1;
  });
  const deckStats = Object.entries(byDeck).map(([deck, v]) => ({ deck, total: v.total, wins: v.wins, winRate: Math.round((v.wins / v.total) * 100) }));

  return {
    matches, total, wins, losses, winRate, prevWinRate, torneio, treino, play, draw,
    matchupStats, bestMatchup, worstMatchups, mirrorMatches, mirrorWins, wonG1LostMatch,
    lossNotes, lossesWithMulligan, totalLosses,
    mullWinRateWith: mullWinRate(gamesWithMulligan), mullWinRateWithout: mullWinRate(gamesNoMulligan),
    bestWinStreak, bestLossStreak, torneios: Object.values(torneiosMap), deckStats,
  };
}

function generateMonthlyNarrative(r, monthKeyStr) {
  if (r.total === 0) return `Nenhuma partida registrada em ${monthLabel(monthKeyStr)} ainda.`;
  const parts = [];

  let opening = `${monthLabel(monthKeyStr).charAt(0).toUpperCase() + monthLabel(monthKeyStr).slice(1)} fechou com ${r.winRate}% de vitórias (${r.wins}V/${r.losses}D em ${r.total} partida${r.total !== 1 ? "s" : ""})`;
  if (r.prevWinRate !== null) {
    const delta = r.winRate - r.prevWinRate;
    if (delta > 5) opening += `, uma alta de ${delta} pontos em relação ao mês anterior. Boa evolução.`;
    else if (delta < -5) opening += `, uma queda de ${Math.abs(delta)} pontos em relação ao mês anterior.`;
    else opening += `, estável em relação ao mês anterior.`;
  } else {
    opening += ".";
  }
  parts.push(opening);

  if (r.bestMatchup) {
    parts.push(`O destaque do mês foi contra ${r.bestMatchup.opp} — você dominou esse matchup com ${r.bestMatchup.winRate}% de vitórias.`);
  }
  if (r.bestWinStreak >= 3) {
    parts.push(`Também vale comemorar a sequência de ${r.bestWinStreak} vitórias seguidas.`);
  }

  if (r.worstMatchups.length > 0) {
    const w = r.worstMatchups[0];
    let attention = `O ponto que mais chama atenção é o matchup contra ${w.opp}: foram ${w.total} confronto${w.total !== 1 ? "s" : ""}, com apenas ${w.wins} vitória${w.wins !== 1 ? "s" : ""}.`;
    const wonG1LostThisOpp = r.wonG1LostMatch.filter((m) => m.oponenteDeck === w.opp).length;
    if (wonG1LostThisOpp > 0) {
      attention += ` Em ${wonG1LostThisOpp} dessas derrotas, você venceu o G1 e ainda assim perdeu a partida — um sinal forte de que o plano de sideboard nesse matchup precisa de revisão.`;
    }
    parts.push(attention);
  }
  if (r.mirrorMatches.length >= 2 && r.mirrorMatches.length - r.mirrorWins > r.mirrorWins) {
    parts.push(`O mirror match também pesou: foram ${r.mirrorMatches.length} jogados, com só ${r.mirrorWins} vitória${r.mirrorWins !== 1 ? "s" : ""}.`);
  }
  if (r.lossNotes.length > 0) {
    parts.push(`Suas próprias anotações do mês reforçam alguns desses pontos — vale reler antes do próximo torneio.`);
  }

  if (r.torneio.total > 0 && r.treino.total > 0) {
    if (r.torneio.winRate > r.treino.winRate + 5) {
      parts.push(`Torneios foram mais fortes que os treinos esse mês (${r.torneio.winRate}% vs ${r.treino.winRate}%) — parece que a pressão competitiva está puxando o seu melhor jogo.`);
    } else if (r.treino.winRate > r.torneio.winRate + 5) {
      parts.push(`Os treinos renderam mais que os torneios esse mês (${r.treino.winRate}% vs ${r.torneio.winRate}%) — pode valer entender o que muda na hora de valer pontos.`);
    }
  }

  return parts.join(" ");
}

async function loadUserData(uidStr) {
  const { db, doc, getDoc } = window.__fb;
  const ref = doc(db, "users", uidStr);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const d = snap.data();
    return { matches: d.matches || [], ownedDecks: d.ownedDecks || [], sideboards: d.sideboards || [] };
  }
  return { matches: [], ownedDecks: [], sideboards: [] };
}

  const { db, doc, setDoc } = window.__fb;

}
async function saveOwnedDecks(uidStr, ownedDecks) {
  const { db, doc, setDoc } = window.__fb;

}

// ---------- Auth gate ----------
function useFirebaseReady() {
  const [ready, setReady] = useState(!!window.__fbReady);
  useEffect(() => {
    if (window.__fbReady) return;
    const handler = () => setReady(true);
    window.addEventListener("firebase-ready", handler);
    return () => window.removeEventListener("firebase-ready", handler);
  }, []);
  return ready;
}

function LoginScreen({ onSignIn, errorMsg }) {
  return (
    <div className="app-shell" style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
      <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#6E6656" }}>Estatísticas de Magic</div>
      <h1 style={{ fontFamily: "'Zilla Slab', serif", fontWeight: 700, fontSize: 28, margin: "6px 0 24px" }}>Playbook</h1>
      <button
        onClick={onSignIn}

function useInstallPrompt() {
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [isStandalone, setIsStandalone] = useState(false);
  const [isIOS, setIsIOS] = useState(false);
  const [dismissed, setDismissed] = useState(false);

  useEffect(() => {
    const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    setIsStandalone(standalone);
    setIsIOS(/iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase()));
    try {
      setDismissed(localStorage.getItem("installBannerDismissed") === "true");
    } catch (e) {}

    function handler(e) {
      e.preventDefault();
      setDeferredPrompt(e);
    }
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  function dismiss() {
    setDismissed(true);
    try { localStorage.setItem("installBannerDismissed", "true"); } catch (e) {}
  }

  async function install() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    setDeferredPrompt(null);
  }

  return {
    showAndroidBanner: !!deferredPrompt && !isStandalone && !dismissed,
    showIOSBanner: isIOS && !isStandalone && !dismissed,
    install,
    dismiss,
  };
}

function InstallBanner({ variant, onInstall, onDismiss }) {
  return (
    <div style={{
      background: "#0A3D91", color: "#FFC700", padding: "10px 14px",
      display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
      fontSize: 13, fontFamily: "'Roboto Condensed', sans-serif",
    }}>
      <div style={{ flex: 1 }}>
        {variant === "android" ? (
          <span><strong>Instale o Playbook</strong> no seu celular pra abrir como app.</span>
        ) : (
          <span><strong>Instale o Playbook:</strong> toque em compartilhar (□↑) e depois em "Adicionar à Tela de Início".</span>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
        {variant === "android" && (
          <button onClick={onInstall} style={{ background: "#FFC700", color: "#0A3D91", border: "none", borderRadius: 6, padding: "6px 12px", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
            Instalar
          </button>
        )}
        <button onClick={onDismiss} style={{ background: "transparent", color: "#FFC700", border: "none", fontSize: 16, cursor: "pointer", padding: "0 4px" }}>×</button>

  );
}

function App() {
  const fbReady = useFirebaseReady();
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [authError, setAuthError] = useState("");
  const [team, setTeam] = useState(null);
  const [teamLoading, setTeamLoading] = useState(true);
  const installPrompt = useInstallPrompt();

  useEffect(() => {
    if (!fbReady) return;
    const { auth, onAuthStateChanged } = window.__fb;
    const unsub = onAuthStateChanged(auth, (u) => {
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  }, [fbReady]);

  useEffect(() => {
    if (!user) { setTeamLoading(false); return; }
    setTeamLoading(true);
    loadUserTeam(user.uid)
      .then((t) => setTeam(t))
      .catch(() => setTeam(null))
      .finally(() => setTeamLoading(false));
  }, [user]);

  async function handleSignIn() {
    setAuthError("");
    try {
      await window.__fb.signInWithPopup(window.__fb.auth, window.__fb.provider);
    } catch (e) {
      setAuthError("Não consegui entrar: " + (e && e.message ? e.message : "erro desconhecido"));
    }
  }
  async function handleSignOut() {
    await window.__fb.signOut(window.__fb.auth);
  }

  const banner = installPrompt.showAndroidBanner ? (
    <InstallBanner variant="android" onInstall={installPrompt.install} onDismiss={installPrompt.dismiss} />
  ) : installPrompt.showIOSBanner ? (
    <InstallBanner variant="ios" onDismiss={installPrompt.dismiss} />
  ) : null;

  if (!fbReady || authLoading) {
    return <div style={{ padding: 24, color: "#6E6656" }}>Carregando…</div>;
  }
  if (!user) {
    return (
      <>
        {banner}
        <LoginScreen onSignIn={handleSignIn} errorMsg={authError} />
      </>
    );
  }
  if (teamLoading) {
    return <div style={{ padding: 24, color: "#6E6656" }}>Carregando…</div>;
  }
  if (!team) {
    return (
      <>
        {banner}
        <TeamGate user={user} onSignOut={handleSignOut} onTeamReady={setTeam} />
      </>
    );
  }
  return (
    <>
      {banner}
      <PauperTracker user={user} team={team} onSignOut={handleSignOut} />
    </>
  );
}

function PauperTracker({ user, team, onSignOut }) {
  const [screen, setScreen] = useState("registrar");
  const [data, setData] = useState({ decks: [], matches: [] });
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState(emptyForm());
  const [saving, setSaving] = useState(false);
  const [savedFlash, setSavedFlash] = useState(false);
  const [error, setError] = useState("");
  const [statsFormato, setStatsFormato] = useState("__all__");
  const [statsDeck, setStatsDeck] = useState("__all__");
  const [statsTipo, setStatsTipo] = useState("todos"); // todos | treino | torneio
  const [newDeckName, setNewDeckName] = useState("");
  const [deckFormatoFilter, setDeckFormatoFilter] = useState("");
  const [deckError, setDeckError] = useState("");
  const [ownedDecks, setOwnedDecks] = useState([]);
  const [editingId, setEditingId] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [chartType, setChartType] = useState("bar");
  const [visible, setVisible] = useState(false);
  const [teamPlayers, setTeamPlayers] = useState([]);
  const [selectedPlayerUid, setSelectedPlayerUid] = useState(null);
  const [sideboards, setSideboards] = useState([]);
  const [sbFormato, setSbFormato] = useState("");
  const [sbDeck, setSbDeck] = useState("");
  const [sbEditingId, setSbEditingId] = useState(null);
  const [sbForm, setSbForm] = useState(null);
  const [sbSelected, setSbSelected] = useState([]);
  const [sbError, setSbError] = useState("");
  const [reportMonth, setReportMonth] = useState("");

  useEffect(() => {
    let matchesLoaded = false;
    let catalogLoaded = false;
    const checkDone = () => { if (matchesLoaded && catalogLoaded) setLoading(false); };

    const unsubscribe = subscribeSharedCatalog(team.teamId, (decks) => {
      setData((prev) => ({ ...prev, decks }));
      catalogLoaded = true;
      checkDone();
    });

    (async () => {
      try {
        const userData = await loadUserData(user.uid);
        setData((prev) => ({ ...prev, matches: userData.matches }));
        setOwnedDecks(userData.ownedDecks);
        setSideboards(userData.sideboards);
      } catch (e) {
        setError("Não consegui carregar suas partidas: " + (e && e.message ? e.message : "erro"));
      } finally {
        matchesLoaded = true;
        checkDone();
      }
    })();

    return () => unsubscribe();
  }, [user.uid]);

  useEffect(() => {
    (async () => {
      try {
        const v = await loadOwnVisibility(team.teamId, user.uid);
        setVisible(v);
      } catch (e) {
        // sem perfil ainda, mantém false
      }
    })();
    const unsub = subscribeVisiblePlayers(team.teamId, user.uid, setTeamPlayers);
    return () => unsub();
  }, [user.uid]);

  async function handleToggleVisibility() {
    const next = !visible;
    setVisible(next);
    try {
      await syncPlayerVisibility(team.teamId, user.uid, user.displayName || user.email, next, data.matches);
    } catch (e) {
      setError("Não consegui atualizar a visibilidade: " + (e && e.message ? e.message : "erro"));
      setVisible(!next);
    }
  }

  useEffect(() => {
    if (loading) return;
    seedPauperDecksIfNeeded(team.teamId, data.decks);
  }, [loading, data.decks]);

  async function persistDecks(nextDecks) {
    try {
      await saveSharedDecks(team.teamId, nextDecks);
      return true;
    } catch (e) {
      setError("Não consegui salvar no catálogo compartilhado: " + (e && e.message ? e.message : "erro desconhecido"));
      return false;
    }
  }
  async function persistMatches(nextMatches) {
    try {
      await saveMatches(user.uid, nextMatches);
      return true;
    } catch (e) {
      setError("Não consegui salvar: " + (e && e.message ? e.message : "erro desconhecido"));
      return false;
    }
  }

  function updateField(field, value) {
    setForm((f) => ({ ...f, [field]: value }));
  }
  function updateGame(index, patch) {
    setForm((f) => {
      const games = f.games.map((g, i) => (i === index ? { ...g, ...patch } : g));
      const trimmed = needsGame3(games) ? games : games.slice(0, 2);
      return { ...f, games: trimmed };
    });
  }
  function addGame3() {
    setForm((f) => (f.games.length < 3 ? { ...f, games: [...f.games, emptyGame()] } : f));
  }

  async function handleAddDeck() {
    const name = newDeckName.trim();
    if (!name) { setDeckError("Digita um nome pro deck."); return; }
    if (!deckFormatoFilter) { setDeckError("Escolhe o formato primeiro."); return; }
    if (data.decks.some((d) => d.name.toLowerCase() === name.toLowerCase() && d.formato === deckFormatoFilter)) { setDeckError("Esse deck já está cadastrado nesse formato."); return; }
    setDeckError("");
    const nextDecks = [...data.decks, { name, formato: deckFormatoFilter }];
    setData((prev) => ({ ...prev, decks: nextDecks }));
    setNewDeckName("");
    await persistDecks(nextDecks);
  }

  async function toggleOwnedDeck(formato, name) {
    const key = deckKey(formato, name);
    const next = ownedDecks.includes(key) ? ownedDecks.filter((k) => k !== key) : [...ownedDecks, key];
    setOwnedDecks(next);
    try {
      await saveOwnedDecks(user.uid, next);
    } catch (e) {
      setError("Não consegui salvar: " + (e && e.message ? e.message : "erro desconhecido"));
    }
  }

  function emptySbForm() {
    return { oponente: "", tirar: [{ qtd: 1, carta: "" }], colocar: [{ qtd: 1, carta: "" }] };
  }
  function openNewSbForm() {
    setSbForm(emptySbForm());
    setSbEditingId(null);
    setSbError("");
  }
  function openEditSbForm(entry) {
    setSbForm({ oponente: entry.oponente, tirar: entry.tirar.map((c) => ({ ...c })), colocar: entry.colocar.map((c) => ({ ...c })) });
    setSbEditingId(entry.id);
    setSbError("");
  }
  function cancelSbForm() {
    setSbForm(null);
    setSbEditingId(null);
    setSbError("");
  }
  function updateSbCard(listName, index, field, value) {
    setSbForm((f) => {
      const list = f[listName].map((c, i) => (i === index ? { ...c, [field]: value } : c));
      return { ...f, [listName]: list };
    });
  }
  function addSbCardRow(listName) {
    setSbForm((f) => ({ ...f, [listName]: [...f[listName], { qtd: 1, carta: "" }] }));
  }
  function removeSbCardRow(listName, index) {
    setSbForm((f) => ({ ...f, [listName]: f[listName].filter((_, i) => i !== index) }));
  }

  async function saveSbEntry() {
    if (!sbForm.oponente) { setSbError("Escolhe o deck adversário."); return; }
    const cleanTirar = sbForm.tirar.filter((c) => c.carta.trim());
    const cleanColocar = sbForm.colocar.filter((c) => c.carta.trim());
    if (cleanTirar.length === 0 && cleanColocar.length === 0) { setSbError("Adiciona pelo menos uma carta pra tirar ou colocar."); return; }
    setSbError("");

    const entry = {
      id: sbEditingId || uid(),
      formato: sbFormato,
      deck: sbDeck,
      oponente: sbForm.oponente,
      tirar: cleanTirar,
      colocar: cleanColocar,
    };
    const next = sbEditingId
      ? sideboards.map((s) => (s.id === sbEditingId ? entry : s))
      : [...sideboards, entry];
    setSideboards(next);
    setSbForm(null);
    setSbEditingId(null);
    try {
      await saveSideboards(user.uid, next);
    } catch (e) {
      setError("Não consegui salvar o sideboard: " + (e && e.message ? e.message : "erro"));
    }
  }

  async function deleteSbEntry(id) {
    const next = sideboards.filter((s) => s.id !== id);
    setSideboards(next);
    setSbSelected((prev) => prev.filter((s) => s !== id));
    try {
      await saveSideboards(user.uid, next);
    } catch (e) {
      setError("Não consegui apagar: " + (e && e.message ? e.message : "erro"));
    }
  }

  function toggleSbSelected(id) {
    setSbSelected((prev) => (prev.includes(id) ? prev.filter((s) => s !== id) : [...prev, id]));
  }

  function formatCardList(list) {
    return list.map((c) => `${c.qtd}x ${c.carta}`).join(", ");
  }

  function generateSbTxt(entries, deckName) {
    const lines = [];
    lines.push(`SIDEBOARD — ${deckName}`);
    lines.push(`Gerado em ${new Date().toLocaleDateString("pt-BR")}`);
    lines.push("");
    entries.forEach((e) => {
      lines.push(`VS ${e.oponente.toUpperCase()}`);
      lines.push(`Tirar: ${e.tirar.length ? formatCardList(e.tirar) : "-"}`);
      lines.push(`Colocar: ${e.colocar.length ? formatCardList(e.colocar) : "-"}`);
      lines.push("");
    });
    const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `sideboard-${deckName.replace(/\s+/g, "-").toLowerCase()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function startEdit(match) {
    setForm({
      formato: match.formato || "", meuDeck: match.meuDeck, oponenteDeck: match.oponenteDeck,
      games: match.games.map((g) => ({ ...g })), tipo: match.tipo,
      local: match.local || "", data: match.data, rodada: match.rodada || "",
      colocacao: match.colocacao || "", nota: match.nota || "",
    });
    setEditingId(match.id);
    setError("");
    setScreen("registrar");
  }
  function cancelEdit() {
    setEditingId(null);
    setForm(emptyForm());
    setError("");
  }
  async function handleDelete(id) {
    const nextMatches = data.matches.filter((m) => m.id !== id);
    setData((prev) => ({ ...prev, matches: nextMatches }));
    setConfirmDeleteId(null);
    await persistMatches(nextMatches);
    if (visible) {
      syncPlayerVisibility(team.teamId, user.uid, user.displayName || user.email, true, nextMatches).catch(() => {});
    }
  }

  async function handleSave() {
    setError("");
    setSaving(true);
    const outcome = matchOutcome(form.games);

    if (!form.formato) {
      setSaving(false); setError("Escolhe o formato da partida."); return;
    }
    if (!form.meuDeck.trim() || !form.oponenteDeck.trim()) {
      setSaving(false); setError("Preenche pelo menos seu deck e o deck do oponente."); return;
    }
    if (!form.games[0].resultado || !form.games[1].resultado) {
      setSaving(false); setError("Registra o resultado do Jogo 1 e do Jogo 2 pelo menos."); return;
    }
    if (needsGame3(form.games) && (form.games.length < 3 || !form.games[2].resultado)) {
      setSaving(false); setError("A partida está 1-1, registra o resultado do Jogo 3."); return;
    }

    try {
      const matchPayload = {
        id: editingId || uid(), formato: form.formato, meuDeck: form.meuDeck.trim(), oponenteDeck: form.oponenteDeck.trim(),
        games: form.games, resultado: outcome.outcome, score: outcome.score,
        tipo: form.tipo, local: form.local, data: form.data, rodada: form.rodada,
        colocacao: form.colocacao, nota: form.nota,
      };
      const nextMatches = editingId
        ? data.matches.map((m) => (m.id === editingId ? matchPayload : m))
        : [...data.matches, matchPayload];

      const ok = await persistMatches(nextMatches);
      setData((prev) => ({ ...prev, matches: nextMatches }));
      if (visible) {
        syncPlayerVisibility(team.teamId, user.uid, user.displayName || user.email, true, nextMatches).catch(() => {});
      }
      if (ok) {
        if (editingId) {
          setEditingId(null); setForm(emptyForm()); setScreen("estatisticas");
        } else {
          setForm({ ...emptyForm(), formato: matchPayload.formato, meuDeck: matchPayload.meuDeck, tipo: matchPayload.tipo, local: matchPayload.tipo === "torneio" ? matchPayload.local : "" });
        }
        setSavedFlash(true);
        setTimeout(() => setSavedFlash(false), 1500);
      }
    } catch (e) {
      setError("Algo deu errado ao salvar: " + (e && e.message ? e.message : "erro desconhecido"));
    } finally {
      setSaving(false);
    }
  }

  const deckOptionsForForm = data.decks.filter((d) => d.formato === form.formato).map((d) => d.name);
  const meuDeckOptions = useMemo(() => {
    return [...deckOptionsForForm].sort((a, b) => {
      const aOwned = ownedDecks.includes(deckKey(form.formato, a)) ? 0 : 1;
      const bOwned = ownedDecks.includes(deckKey(form.formato, b)) ? 0 : 1;
      if (aOwned !== bOwned) return aOwned - bOwned;
      return a.localeCompare(b);
    });
  }, [deckOptionsForForm, ownedDecks, form.formato]);
  const oponenteDeckOptions = useMemo(() => {
    return [...deckOptionsForForm].sort((a, b) => a.localeCompare(b));
  }, [deckOptionsForForm]);
  const filteredMatches = useMemo(() => {
    let list = data.matches;
    if (statsFormato !== "__all__") list = list.filter((m) => m.formato === statsFormato);
    if (statsDeck !== "__all__") list = list.filter((m) => m.meuDeck === statsDeck);
    if (statsTipo !== "todos") list = list.filter((m) => m.tipo === statsTipo);
    return list;
  }, [data.matches, statsFormato, statsDeck, statsTipo]);
  const deckOptionsForStats = useMemo(() => {
    const names = statsFormato === "__all__"
      ? data.decks.map((d) => d.name)
      : data.decks.filter((d) => d.formato === statsFormato).map((d) => d.name);
    return Array.from(new Set(names));
  }, [data.decks, statsFormato]);
  const overall = useMemo(() => {
    const total = filteredMatches.length;
    const wins = filteredMatches.filter((m) => m.resultado === "vitoria").length;
    const losses = filteredMatches.filter((m) => m.resultado === "derrota").length;
    return { total, wins, losses, winRate: total ? Math.round((wins / total) * 100) : 0 };
  }, [filteredMatches]);
  const matchupStats = useMemo(() => {
    const byOpp = {};
    filteredMatches.forEach((m) => {
      byOpp[m.oponenteDeck] = byOpp[m.oponenteDeck] || { total: 0, wins: 0 };
      byOpp[m.oponenteDeck].total += 1;
      if (m.resultado === "vitoria") byOpp[m.oponenteDeck].wins += 1;
    });
    return Object.entries(byOpp)
      .map(([opp, v]) => ({ opp, total: v.total, wins: v.wins, winRate: Math.round((v.wins / v.total) * 100) }))
      .sort((a, b) => b.total - a.total);
  }, [filteredMatches]);
  const playDrawStats = useMemo(() => {
    const allGames = filteredMatches.flatMap((m) => m.games || []);
    const summarize = (games) => {
      const total = games.length;
      const wins = games.filter((g) => g.resultado === "vitoria").length;
      return { total, wins, winRate: total ? Math.round((wins / total) * 100) : 0 };
    };
    return {
      play: summarize(allGames.filter((g) => g.playDraw === "play")),
      draw: summarize(allGames.filter((g) => g.playDraw === "draw")),
    };
  }, [filteredMatches]);
  const bestMatchup = matchupStats.filter((m) => m.total >= 2).sort((a, b) => b.winRate - a.winRate)[0];
  const worstMatchup = matchupStats.filter((m) => m.total >= 2).sort((a, b) => a.winRate - b.winRate)[0];
  const chartData = matchupStats.map((m) => ({ name: m.opp, winRate: m.winRate, total: m.total }));
  const totalGamesForPie = chartData.reduce((s, d) => s + d.total, 0);
  const pieData = chartData.map((d) => ({ ...d, percent: totalGamesForPie ? Math.round((d.total / totalGamesForPie) * 100) : 0 }));
  const [teamStatsFormato, setTeamStatsFormato] = useState("__all__");

  const combinedMatches = useMemo(() => {
    const own = visible ? data.matches.filter((m) => m.tipo === "torneio") : [];
    const others = teamPlayers.flatMap((p) => p.matches.filter((m) => m.tipo === "torneio"));
    return [...own, ...others];
  }, [visible, data.matches, teamPlayers]);
  const teamFilteredMatches = useMemo(() => {
    let list = combinedMatches;
    if (teamStatsFormato !== "__all__") list = list.filter((m) => m.formato === teamStatsFormato);
    return list;
  }, [combinedMatches, teamStatsFormato]);
  const teamStats = useMemo(() => computeMatchStats(teamFilteredMatches), [teamFilteredMatches]);
  const contributingCount = teamPlayers.length + (visible ? 1 : 0);

  const sortedDeckList = useMemo(() => {
    const list = data.decks.filter((d) => d.formato === deckFormatoFilter);
    return [...list].sort((a, b) => {
      const aOwned = ownedDecks.includes(deckKey(a.formato, a.name)) ? 0 : 1;
      const bOwned = ownedDecks.includes(deckKey(b.formato, b.name)) ? 0 : 1;
      if (aOwned !== bOwned) return aOwned - bOwned;
      return a.name.localeCompare(b.name);
    });
  }, [data.decks, deckFormatoFilter, ownedDecks]);

  const sbMyDeckOptions = useMemo(() => {
    return data.decks
      .filter((d) => d.formato === sbFormato && ownedDecks.includes(deckKey(d.formato, d.name)))
      .map((d) => d.name)
      .sort((a, b) => a.localeCompare(b));
  }, [data.decks, sbFormato, ownedDecks]);
  const sbOpponentOptions = useMemo(() => {
    return data.decks.filter((d) => d.formato === sbFormato).map((d) => d.name).sort((a, b) => a.localeCompare(b));
  }, [data.decks, sbFormato]);
  const sbEntriesForDeck = useMemo(() => {
    return sideboards
      .filter((s) => s.formato === sbFormato && s.deck === sbDeck)
      .sort((a, b) => a.oponente.localeCompare(b.oponente));
  }, [sideboards, sbFormato, sbDeck]);
  const sbPlanForRegistro = useMemo(() => {
    if (!form.formato || !form.meuDeck || !form.oponenteDeck) return null;
    return sideboards.find((s) => s.formato === form.formato && s.deck === form.meuDeck && s.oponente === form.oponenteDeck) || null;
  }, [sideboards, form.formato, form.meuDeck, form.oponenteDeck]);

  const availableMonths = useMemo(() => {
    const keys = Array.from(new Set(data.matches.map((m) => monthKey(m.data))));
    return keys.sort().reverse();
  }, [data.matches]);
  const monthlyReport = useMemo(() => {
    if (!reportMonth) return null;
    return computeMonthlyReport(data.matches, reportMonth);
  }, [data.matches, reportMonth]);
  const monthlyNarrative = useMemo(() => {
    if (!reportMonth || !monthlyReport) return "";
    return generateMonthlyNarrative(monthlyReport, reportMonth);
  }, [monthlyReport, reportMonth]);
  const favoriteDecksByFormato = useMemo(() => {
    const grouped = {};
    ownedDecks.forEach((key) => {
      const [formato, name] = key.split("||");
      grouped[formato] = grouped[formato] || [];
      grouped[formato].push(name);
    });
    Object.keys(grouped).forEach((f) => grouped[f].sort((a, b) => a.localeCompare(b)));
    return grouped;
  }, [ownedDecks]);

  const showGame3 = needsGame3(form.games);

  return (
    <div className="app-shell">
      <div style={{ padding: "18px 16px 10px", borderBottom: "3px solid #2A2621", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#6E6656" }}>{team.name}</div>
          <h1 style={{ fontFamily: "'Zilla Slab', serif", fontWeight: 700, fontSize: 26, margin: "4px 0 0" }}>Playbook</h1>
        </div>
        <button
          onClick={() => setScreen("perfil")}
          style={{
            display: "flex", alignItems: "center", gap: 8,
            background: "#F6F1E1", border: "1px solid #C9C0A6", borderRadius: 10,
            padding: "8px 10px 8px 8px", cursor: "pointer",
          }}
        >
          <div style={{
            width: 30, height: 30, borderRadius: "50%", background: "#2A2621", color: "#EFE9D8",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: "'Zilla Slab', serif", fontWeight: 700, fontSize: 14, flexShrink: 0,
          }}>
            {(user.displayName || user.email || "?").charAt(0).toUpperCase()}
          </div>
          <div style={{ textAlign: "left" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#2A2621", lineHeight: 1.1 }}>{(user.displayName || user.email || "").split(" ")[0]}</div>
            <div style={{ fontSize: 10, color: "#8A8270", lineHeight: 1.1 }}>Ver perfil</div>
          </div>
          <span style={{ color: "#8A8270", fontSize: 14, marginLeft: 2 }}>›</span>
        </button>
      </div>

      <div className="tab-bar">
        {[{ key: "registrar", label: "Registrar" }, { key: "sideboard", label: "Sideboard" }, { key: "estatisticas", label: "Estatísticas" }, { key: "decks", label: "Decks" }, { key: "jogadores", label: "Jogadores" }].map((t) => (
          <button key={t.key} className="tab-btn" onClick={() => setScreen(t.key)} style={{
            background: screen === t.key ? "#F6F1E1" : "transparent",
            borderBottom: screen === t.key ? "3px solid #B15C3E" : "3px solid transparent",
            fontWeight: screen === t.key ? 700 : 500,
            color: screen === t.key ? "#2A2621" : "#6E6656",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ padding: 16 }}>
        {loading && <div style={{ color: "#6E6656", fontSize: 14 }}>Carregando…</div>}
        {error && <div style={{ background: "#F2E1DC", borderLeft: "4px solid #8A3F35", borderRadius: 6, padding: "10px 12px", fontSize: 13, marginBottom: 14 }}>{error}</div>}

        {!loading && screen === "registrar" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {editingId && (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#EFE0C9", borderLeft: "4px solid #B15C3E", borderRadius: 6, padding: "10px 12px", fontSize: 13 }}>
                <span>Editando partida salva</span>
                <button onClick={cancelEdit} style={{ border: "none", background: "transparent", color: "#8A3F35", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Cancelar</button>
              </div>
            )}

            <Field label="Formato">
              <select value={form.formato} onChange={(e) => setForm((f) => ({ ...f, formato: e.target.value, meuDeck: "", oponenteDeck: "" }))} style={inputStyle}>
                <option value="">Selecione um formato</option>
                {FORMATOS.map((f) => <option key={f} value={f}>{f}</option>)}
              </select>
            </Field>

            <Field label="Meu deck">
              {!form.formato ? (
                <div style={{ fontSize: 13, color: "#8A3F35" }}>Escolhe o formato primeiro.</div>
              ) : deckOptionsForForm.length === 0 ? (
                <div style={{ fontSize: 13, color: "#8A3F35" }}>Nenhum deck cadastrado nesse formato. Vai na aba "Decks".</div>
              ) : (
                <select value={form.meuDeck} onChange={(e) => updateField("meuDeck", e.target.value)} style={inputStyle}>
                  <option value="">Selecione um deck</option>
                  {meuDeckOptions.map((d) => (
                    <option key={d} value={d}>{ownedDecks.includes(deckKey(form.formato, d)) ? "★ " + d : d}</option>
                  ))}
                </select>
              )}
            </Field>
            <Field label="Deck do oponente">
              {!form.formato ? (
                <div style={{ fontSize: 13, color: "#8A3F35" }}>Escolhe o formato primeiro.</div>
              ) : deckOptionsForForm.length === 0 ? (
                <div style={{ fontSize: 13, color: "#8A3F35" }}>Cadastra os decks na aba "Decks" primeiro.</div>
              ) : (
                <select value={form.oponenteDeck} onChange={(e) => updateField("oponenteDeck", e.target.value)} style={inputStyle}>
                  <option value="">Selecione um deck</option>
                  {oponenteDeckOptions.map((d) => <option key={d} value={d}>{d}</option>)}
                </select>
              )}
            </Field>

            {sbPlanForRegistro && (
              <div style={{ background: "#EFE0C9", borderLeft: "4px solid #B15C3E", borderRadius: 6, padding: "10px 12px", fontSize: 13 }}>
                <div style={{ fontWeight: 700, marginBottom: 4 }}>Plano de side vs {form.oponenteDeck}</div>
                {sbPlanForRegistro.tirar.length > 0 && <div><strong>Tirar:</strong> {formatCardList(sbPlanForRegistro.tirar)}</div>}
                {sbPlanForRegistro.colocar.length > 0 && <div><strong>Colocar:</strong> {formatCardList(sbPlanForRegistro.colocar)}</div>}
              </div>
            )}

            <GameRow label="Jogo 1" game={form.games[0]} onChange={(p) => updateGame(0, p)} />
            <GameRow label="Jogo 2" game={form.games[1]} onChange={(p) => updateGame(1, p)} />
            {showGame3 && (
              <GameRow label="Jogo 3 (decisivo)" game={form.games[2] || emptyGame()} onChange={(p) => { if (form.games.length < 3) addGame3(); updateGame(2, p); }} />
            )}

            <div style={{ background: "#F6F1E1", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#6E6656", display: "flex", justifyContent: "space-between" }}>
              <span>Placar da partida</span>
              <span style={{ fontWeight: 700, color: "#2A2621" }}>{matchOutcome(form.games).score}</span>
            </div>

            <Field label="Tipo de partida">
              <div style={{ display: "flex", gap: 8 }}>
                {[{ key: "torneio", label: "Torneio / Loja" }, { key: "treino", label: "Treino" }].map((o) => (
                  <button key={o.key} onClick={() => updateField("tipo", o.key)} style={{
                    flex: 1, padding: "10px 0", borderRadius: 6,
                    border: form.tipo === o.key ? "2px solid #2A2621" : "1px solid #C9C0A6",
                    background: form.tipo === o.key ? "#2A2621" : "#F6F1E1",
                    color: form.tipo === o.key ? "#EFE9D8" : "#2A2621", fontWeight: 700, fontSize: 13, cursor: "pointer",
                  }}>{o.label}</button>
                ))}
              </div>
            </Field>
            <Field label={form.tipo === "torneio" ? "Loja / evento" : "Com quem treinou (opcional)"}>
              <input value={form.local} onChange={(e) => updateField("local", e.target.value)}
                placeholder={form.tipo === "torneio" ? "Ex: Arena dos Cards" : "Ex: treino com amigos"} style={inputStyle} />
            </Field>
            {form.tipo === "torneio" && (
              <>
                <Field label="Rodada">
                  <input type="number" min="1" value={form.rodada} onChange={(e) => updateField("rodada", e.target.value)} placeholder="Ex: 2" style={inputStyle} />
                </Field>
                <Field label="Colocação final (opcional)">
                  <input value={form.colocacao} onChange={(e) => updateField("colocacao", e.target.value)} placeholder="Ex: 3-1, Top 8" style={inputStyle} />
                </Field>
              </>
            )}
            <Field label="Data">
              <DatePicker value={form.data} onChange={(iso) => updateField("data", iso)} />
            </Field>
            <Field label="Anotação (opcional)">
              <textarea value={form.nota} onChange={(e) => updateField("nota", e.target.value)} placeholder="Jogadas erradas, sideboard que funcionou..." rows={3} style={{ ...inputStyle, resize: "vertical" }} />
            </Field>

            <button onClick={handleSave} disabled={saving} style={{
              marginTop: 6, padding: "14px", borderRadius: 8, border: "none",
              background: savedFlash ? "#4B6B4E" : "#2A2621", color: "#EFE9D8",
              fontWeight: 700, fontSize: 15, letterSpacing: 0.5,
              cursor: saving ? "default" : "pointer", opacity: saving ? 0.7 : 1,
            }}>
              {savedFlash ? "Salvo ✓" : saving ? "Salvando…" : editingId ? "Atualizar partida" : "Salvar partida"}
            </button>
          </div>
        )}

        {!loading && screen === "sideboard" && (
          <div>
            <div style={{ background: "#EFE0C9", borderLeft: "4px solid #B15C3E", borderRadius: 6, padding: "10px 12px", fontSize: 13, marginBottom: 16 }}>
              Cadastre o que tirar/colocar contra cada deck adversário. Isso é só seu — não aparece pro time.
            </div>

            <Field label="Formato">
              <select value={sbFormato} onChange={(e) => { setSbFormato(e.target.value); setSbDeck(""); setSbForm(null); setSbSelected([]); }} style={inputStyle}>
                <option value="">Selecione um formato</option>
                {SIDEBOARD_FORMATOS.map((f) => <option key={f} value={f}>{f}</option>)}
              </select>
            </Field>

            {sbFormato && (
              <>
                <div style={{ height: 12 }} />
                <Field label="Meu deck">
                  {sbMyDeckOptions.length === 0 ? (
                    <div style={{ fontSize: 13, color: "#8A3F35" }}>Marca algum deck como seu na aba "Decks" primeiro.</div>
                  ) : (
                    <select value={sbDeck} onChange={(e) => { setSbDeck(e.target.value); setSbForm(null); setSbSelected([]); }} style={inputStyle}>
                      <option value="">Selecione um deck</option>
                      {sbMyDeckOptions.map((d) => <option key={d} value={d}>{d}</option>)}
                    </select>
                  )}
                </Field>
              </>
            )}

            {sbFormato && sbDeck && (
              <>
                <div style={{ marginTop: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <SectionLabel>Matchups de {sbDeck} ({sbEntriesForDeck.length})</SectionLabel>
                  {!sbForm && (
                    <button onClick={openNewSbForm} style={{ border: "none", background: "#2A2621", color: "#EFE9D8", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                      + Novo matchup
                    </button>
                  )}
                </div>

                {sbForm && (
                  <div style={{ background: "#F6F1E1", borderRadius: 8, padding: 14, marginTop: 10 }}>
                    <Field label="Deck adversário">
                      <select value={sbForm.oponente} onChange={(e) => setSbForm((f) => ({ ...f, oponente: e.target.value }))} style={inputStyle}>
                        <option value="">Selecione um deck</option>
                        {sbOpponentOptions.map((d) => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </Field>

                    <div style={{ height: 12 }} />
                    <div style={{ fontSize: 12, letterSpacing: 0.6, textTransform: "uppercase", color: "#6E6656", marginBottom: 6 }}>Tirar</div>
                    {sbForm.tirar.map((c, i) => (
                      <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                        <QtyPicker value={c.qtd} onChange={(n) => updateSbCard("tirar", i, "qtd", n)} />
                        <input value={c.carta} onChange={(e) => updateSbCard("tirar", i, "carta", e.target.value)} placeholder="Nome da carta" style={{ ...inputStyle, flex: 1 }} />
                        <button onClick={() => removeSbCardRow("tirar", i)} style={{ border: "1px solid #C9C0A6", background: "transparent", color: "#8A3F35", borderRadius: 6, padding: "0 10px", cursor: "pointer" }}>×</button>
                      </div>
                    ))}
                    <button onClick={() => addSbCardRow("tirar")} style={{ border: "1px dashed #C9C0A6", background: "transparent", color: "#6E6656", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>+ carta</button>

                    <div style={{ height: 14 }} />
                    <div style={{ fontSize: 12, letterSpacing: 0.6, textTransform: "uppercase", color: "#6E6656", marginBottom: 6 }}>Colocar</div>
                    {sbForm.colocar.map((c, i) => (
                      <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                        <QtyPicker value={c.qtd} onChange={(n) => updateSbCard("colocar", i, "qtd", n)} />
                        <input value={c.carta} onChange={(e) => updateSbCard("colocar", i, "carta", e.target.value)} placeholder="Nome da carta" style={{ ...inputStyle, flex: 1 }} />
                        <button onClick={() => removeSbCardRow("colocar", i)} style={{ border: "1px solid #C9C0A6", background: "transparent", color: "#8A3F35", borderRadius: 6, padding: "0 10px", cursor: "pointer" }}>×</button>
                      </div>
                    ))}
                    <button onClick={() => addSbCardRow("colocar")} style={{ border: "1px dashed #C9C0A6", background: "transparent", color: "#6E6656", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>+ carta</button>

                    {sbError && <div style={{ color: "#8A3F35", fontSize: 13, marginTop: 10 }}>{sbError}</div>}

                    <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                      <button onClick={saveSbEntry} style={{ flex: 1, border: "none", background: "#2A2621", color: "#EFE9D8", borderRadius: 6, padding: "10px 0", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                        Salvar matchup
                      </button>
                      <button onClick={cancelSbForm} style={{ flex: 1, border: "1px solid #C9C0A6", background: "transparent", color: "#6E6656", borderRadius: 6, padding: "10px 0", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                        Cancelar
                      </button>
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 8 }}>
                  {sbEntriesForDeck.length === 0 && !sbForm && (
                    <div style={{ color: "#6E6656", fontSize: 14, padding: "16px 0", textAlign: "center" }}>Nenhum matchup cadastrado ainda.</div>
                  )}
                  {sbEntriesForDeck.map((entry) => (
                    <div key={entry.id} style={{ background: "#F6F1E1", borderRadius: 8, padding: "12px 14px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                          <input type="checkbox" checked={sbSelected.includes(entry.id)} onChange={() => toggleSbSelected(entry.id)} />
                          <span style={{ fontFamily: "'Zilla Slab', serif", fontWeight: 700, fontSize: 15 }}>vs {entry.oponente}</span>
                        </label>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => openEditSbForm(entry)} style={{ border: "1px solid #C9C0A6", background: "transparent", color: "#2A2621", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Editar</button>
                          <button onClick={() => deleteSbEntry(entry.id)} style={{ border: "1px solid #C9C0A6", background: "transparent", color: "#8A3F35", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Apagar</button>
                        </div>
                      </div>
                      <div style={{ fontSize: 12, color: "#4A4436", marginTop: 6 }}>
                        {entry.tirar.length > 0 && <div><strong>Tirar:</strong> {formatCardList(entry.tirar)}</div>}
                        {entry.colocar.length > 0 && <div><strong>Colocar:</strong> {formatCardList(entry.colocar)}</div>}
                      </div>
                    </div>
                  ))}
                </div>

                {sbEntriesForDeck.length > 0 && (
                  <button
                    onClick={() => generateSbTxt(sbEntriesForDeck.filter((e) => sbSelected.includes(e.id)), sbDeck)}
                    disabled={sbSelected.length === 0}
                    style={{
                      marginTop: 16, width: "100%", padding: "12px", borderRadius: 8, border: "none",
                      background: sbSelected.length === 0 ? "#C9C0A6" : "#2A2621",
                      color: "#EFE9D8", fontWeight: 700, fontSize: 14,
                      cursor: sbSelected.length === 0 ? "default" : "pointer",
                    }}
                  >
                    Gerar lista (.txt) — {sbSelected.length} selecionado{sbSelected.length !== 1 ? "s" : ""}
                  </button>
                )}
              </>
            )}
          </div>
        )}

        {!loading && screen === "estatisticas" && (
          <div>
            {data.matches.length === 0 ? (
              <div style={{ color: "#6E6656", fontSize: 14, textAlign: "center", padding: "40px 0" }}>Nenhuma partida registrada ainda.</div>
            ) : (
              <>
                <Field label="Filtrar por formato">
                  <select value={statsFormato} onChange={(e) => { setStatsFormato(e.target.value); setStatsDeck("__all__"); }} style={inputStyle}>
                    <option value="__all__">Todos os formatos</option>
                    {FORMATOS.map((f) => <option key={f} value={f}>{f}</option>)}
                  </select>
                </Field>

                <Field label="Filtrar por deck">
                  <select value={statsDeck} onChange={(e) => setStatsDeck(e.target.value)} style={inputStyle}>
                    <option value="__all__">Todos os decks</option>
                    {deckOptionsForStats.map((d) => <option key={d} value={d}>{d}</option>)}
                  </select>
                </Field>

                <div style={{ height: 12 }} />
                <Field label="Tipo de partida">
                  <div style={{ display: "flex", gap: 8 }}>
                    {[{ key: "todos", label: "Todos" }, { key: "treino", label: "Treino" }, { key: "torneio", label: "Torneio" }].map((o) => (
                      <button key={o.key} onClick={() => setStatsTipo(o.key)} style={{
                        flex: 1, padding: "8px 0", borderRadius: 6,

// ---------- Small components ----------
function QtyPicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [coords, setCoords] = useState(null);
  const btnRef = useRef(null);
  const popRef = useRef(null);

  function openPicker() {
    const rect = btnRef.current.getBoundingClientRect();
    setCoords({ left: rect.left, top: rect.bottom + 6 });
    setOpen(true);
  }

  useEffect(() => {
    if (!open) return;
    function handleClickOutside(e) {
      if (popRef.current && !popRef.current.contains(e.target) && btnRef.current && !btnRef.current.contains(e.target)) {
        setOpen(false);
      }
    }
    function handleScrollOrResize() { setOpen(false); }
    document.addEventListener("mousedown", handleClickOutside);
    window.addEventListener("scroll", handleScrollOrResize, true);
    window.addEventListener("resize", handleScrollOrResize);
    return () => {
      document.removeEventListener("mousedown", handleClickOutside);
      window.removeEventListener("scroll", handleScrollOrResize, true);
      window.removeEventListener("resize", handleScrollOrResize);
    };
  }, [open]);

  return (
    <>
      <button
        type="button"
        ref={btnRef}
        onClick={() => (open ? setOpen(false) : openPicker())}
        style={{ width: 48, height: 38, borderRadius: 6, border: "1px solid #C9C0A6", background: "#EFE9D8", color: "#2A2621", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
      >
        {value}x
      </button>
      {open && coords && (
        <div
          ref={popRef}
          style={{
            position: "fixed", zIndex: 1000, top: coords.top, left: coords.left,
            background: "#F6F1E1", border: "1px solid #C9C0A6", borderRadius: 8,
            padding: 8, display: "flex", gap: 6, boxShadow: "0 6px 18px rgba(42,38,33,0.25)",
          }}
        >
          {[1, 2, 3, 4].map((n) => (
            <button
              key={n}
              type="button"
              onClick={() => { onChange(n); setOpen(false); }}
              style={{
                width: 32, height: 32, borderRadius: 6,
                border: value === n ? "2px solid #2A2621" : "1px solid #C9C0A6",
                background: value === n ? "#2A2621" : "#EFE9D8",
                color: value === n ? "#EFE9D8" : "#2A2621",
                fontWeight: 700, fontSize: 13, cursor: "pointer",
              }}
            >{n}</button>
          ))}
        </div>
      )}
    </>
  );
}

function DatePicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [coords, setCoords] = useState(null);
  const btnRef = useRef(null);
  const popRef = useRef(null);
  const initial = value ? new Date(value + "T00:00:00") : new Date();
  const [viewYear, setViewYear] = useState(initial.getFullYear());
  const [viewMonth, setViewMonth] = useState(initial.getMonth());

  function openPicker() {
    const rect = btnRef.current.getBoundingClientRect();
    const popH = 300;
    const spaceBelow = window.innerHeight - rect.bottom;
    const openUpward = spaceBelow < popH && rect.top > popH;
    setCoords({
      left: Math.min(rect.left, window.innerWidth - 268),
      top: openUpward ? rect.top - popH - 6 : rect.bottom + 6,
      width: rect.width,
    });
    setOpen(true);
  }

  useEffect(() => {
    if (!open) return;
    function handleClickOutside(e) {
      if (popRef.current && !popRef.current.contains(e.target) && btnRef.current && !btnRef.current.contains(e.target)) {
        setOpen(false);
      }
    }
    function handleScrollOrResize() { setOpen(false); }
    document.addEventListener("mousedown", handleClickOutside);
    window.addEventListener("scroll", handleScrollOrResize, true);
    window.addEventListener("resize", handleScrollOrResize);
    return () => {
      document.removeEventListener("mousedown", handleClickOutside);
      window.removeEventListener("scroll", handleScrollOrResize, true);
      window.removeEventListener("resize", handleScrollOrResize);
    };
  }, [open]);

  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function isoFor(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
  function formatDisplay(iso) {
    if (!iso) return "Selecionar data";
    const [y, m, d] = iso.split("-");
    return `${d}/${m}/${y}`;
  }
  function changeMonth(delta) {
    let y = viewYear, m = viewMonth + delta;
    if (m < 0) { m = 11; y -= 1; }
    if (m > 11) { m = 0; y += 1; }
    setViewYear(y); setViewMonth(m);
  }

  const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
  const weekDays = ["D", "S", "T", "Q", "Q", "S", "S"];
  const totalDays = new Date(viewYear, viewMonth + 1, 0).getDate();
  const startWeekday = new Date(viewYear, viewMonth, 1).getDay();
  const todayIso = todayISO();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);

  return (
    <div>
      <button
        type="button"
        ref={btnRef}
        onClick={() => (open ? setOpen(false) : openPicker())}
        style={{ ...inputStyle, textAlign: "left", cursor: "pointer", display: "block", width: "100%" }}
      >
        {formatDisplay(value)}
      </button>
      {open && coords && (
        <div
          ref={popRef}
          style={{
            position: "fixed", zIndex: 1000, top: coords.top, left: coords.left,
            background: "#F6F1E1", border: "1px solid #C9C0A6", borderRadius: 8,
            padding: 12, width: 260, boxShadow: "0 6px 18px rgba(42,38,33,0.25)",
          }}
        >
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <button type="button" onClick={() => changeMonth(-1)} style={{ border: "none", background: "transparent", fontSize: 18, cursor: "pointer", color: "#2A2621", fontWeight: 700, padding: "0 8px" }}>‹</button>
            <span style={{ fontFamily: "'Zilla Slab', serif", fontWeight: 700, fontSize: 14 }}>{monthNames[viewMonth]} {viewYear}</span>
            <button type="button" onClick={() => changeMonth(1)} style={{ border: "none", background: "transparent", fontSize: 18, cursor: "pointer", color: "#2A2621", fontWeight: 700, padding: "0 8px" }}>›</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
            {weekDays.map((w, i) => (
              <div key={i} style={{ textAlign: "center", fontSize: 10, color: "#8A8270", fontWeight: 700 }}>{w}</div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
            {cells.map((day, i) => {
              if (day === null) return <div key={i} />;
              const iso = isoFor(viewYear, viewMonth, day);
              const isSelected = iso === value;
              const isToday = iso === todayIso;
              return (
                <button
                  type="button"
                  key={i}
                  onClick={() => { onChange(iso); setOpen(false); }}
                  style={{
                    width: 32, height: 32, borderRadius: 6,
                    border: isToday && !isSelected ? "1px solid #B15C3E" : "1px solid transparent",
                    background: isSelected ? "#2A2621" : "transparent",
                    color: isSelected ? "#EFE9D8" : "#2A2621",
                    fontSize: 12, fontWeight: isSelected ? 700 : 500, cursor: "pointer",
                  }}
                >
                  {day}
                </button>
              );
            })}
          </div>
          <button
            type="button"
            onClick={() => { onChange(todayIso); setOpen(false); }}
            style={{ marginTop: 10, width: "100%", padding: "6px 0", borderRadius: 6, border: "1px solid #C9C0A6", background: "transparent", color: "#6E6656", fontSize: 12, fontWeight: 700, cursor: "pointer" }}
          >
            Hoje
          </button>
        </div>
      )}
    </div>
  );
}

function Field({ label, children }) {
  return <div><div style={{ fontSize: 12, letterSpacing: 0.6, textTransform: "uppercase", color: "#6E6656", marginBottom: 6 }}>{label}</div>{children}</div>;
}
function SectionLabel({ children }) {
  return <div style={{ fontSize: 12, letterSpacing: 1, textTransform: "uppercase", color: "#6E6656", marginBottom: 8 }}>{children}</div>;
}
function Insight({ tone, text }) {
  const bg = tone === "good" ? "#E4EDE3" : "#F2E1DC";
  const bar = tone === "good" ? "#4B6B4E" : "#8A3F35";
  return <div style={{ background: bg, borderLeft: `4px solid ${bar}`, borderRadius: 6, padding: "10px 12px", fontSize: 13, color: "#2A2621" }}>{text}</div>;
}
function BarChartCustom({ data }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {data.map((d, i) => (
        <div key={i}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
            <span>{d.name}</span>
            <span style={{ fontWeight: 700 }}>{d.winRate}% ({d.total})</span>
          </div>
          <div style={{ background: "#E4DBC0", borderRadius: 4, height: 14, overflow: "hidden" }}>
            <div style={{ width: d.winRate + "%", height: "100%", background: barColor(d.winRate), borderRadius: 4 }} />
          </div>
        </div>
      ))}
    </div>
  );
}
function PieChartCustom({ data }) {
  let cumulative = 0;
  const stops = data.map((d) => {
    const start = cumulative;
    cumulative += d.percent;
    return `${barColor(d.winRate)} ${start}% ${cumulative}%`;
  }).join(", ");
  const gradient = data.length ? `conic-gradient(${stops})` : "#E4DBC0";
  return (
    <div style={{ display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap" }}>
      <div style={{ width: 150, height: 150, borderRadius: "50%", background: gradient, flexShrink: 0 }} />
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
            <span style={{ width: 10, height: 10, borderRadius: 2, background: barColor(d.winRate), flexShrink: 0 }} />
            <span><strong>{d.name}</strong> · {d.percent}% das partidas · {d.winRate}% win rate</span>
          </div>
        ))}
      </div>
    </div>
  );
}
